# пайплайн для ветки feature
name: Feature

on: 
  push:
    branches-ignore:
      -  main
  pull_request:
    branches:
      - main    

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: 'golang:1.26.4'
    steps:
      - uses: actions/checkout@v7.0.0
      - run: go test -v ./...  
  
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.4
      - uses: actions/checkout@v7.0.0
      - run: go vet -v ./...  
    
  build:
    needs:
      - test
      - lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.4
      - uses: actions/checkout@v7.0.0
      - run: go build -o app.exe ./main.go
